version: '3.9'

services:

  # ── Neo4j ────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: flourisher-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-flourisher123}"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flourisher-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEO4J_URI:      "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-flourisher123}"

      APP_USERNAME:   "${APP_USERNAME:-admin}"
      APP_PASSWORD:   "${APP_PASSWORD:-admin}"
      JWT_SECRET:     "${JWT_SECRET:-please-change-this-secret}"

    depends_on:
      neo4j:
        condition: service_started

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flourisher-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
